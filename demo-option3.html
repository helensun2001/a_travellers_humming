<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanderer · 上海 · 方案三 Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream:        #FBF8F3;
    --cream-dark:   #F0E9DC;
    --gold:         #C8A45A;
    --gold-light:   #EDD89A;
    --gold-pale:    #F5EDD8;
    --gold-dark:    #8B6A20;
    --amber:        #A07228;
    --text-primary: #1C1208;
    --text-secondary:#6B5B3E;
    --text-muted:   #A08C68;
    --border:       #E2D4B4;
    --white:        #FFFDF8;
    --red-stamp:    #9B2335;
    --font-sans:    'Inter', -apple-system, sans-serif;
    --font-serif:   'Fraunces', Georgia, serif;
  }

  body {
    font-family: var(--font-sans);
    background: linear-gradient(135deg, #D4C9B8 0%, #C8BBA8 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
    gap: 16px;
  }

  /* ─── LABEL ─── */
  .demo-label {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8A7D6A;
    background: rgba(255,255,255,0.5);
    padding: 6px 16px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
  }

  /* ─── PHONE FRAME ─── */
  .phone {
    position: relative;
    width: 375px;
    height: 812px;
    background: var(--cream);
    border-radius: 48px;
    overflow: hidden;
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.3) inset,
      0 0 0 10px #1C1A18,
      0 0 0 12px #2A2826,
      0 50px 120px rgba(0,0,0,0.5),
      0 20px 40px rgba(0,0,0,0.3);
    flex-shrink: 0;
  }

  /* Dynamic island */
  .phone::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 118px;
    height: 34px;
    background: #0E0D0C;
    border-radius: 20px;
    z-index: 1000;
  }

  /* ─── MAP ─── */
  #map {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .leaflet-tile-pane {
    filter: sepia(20%) saturate(0.95) hue-rotate(8deg) brightness(0.97);
  }

  /* hide leaflet attribution on demo */
  .leaflet-control-attribution { display: none; }
  .leaflet-control-zoom { display: none; }

  /* ─── STATUS BAR ─── */
  .status-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 6px;
    z-index: 90;
    pointer-events: none;
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 600;
  }

  /* ─── MAP HEADER ─── */
  .map-header {
    position: absolute;
    top: 54px; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    z-index: 80;
    pointer-events: none;
  }

  .map-header-pill {
    background: rgba(251,248,243,0.92);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 8px 16px;
    border: 1px solid rgba(200,164,90,0.3);
    pointer-events: all;
  }

  .app-name {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .app-name span { color: var(--gold); }

  .collection-counter {
    background: rgba(251,248,243,0.92);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 8px 14px;
    border: 1px solid rgba(200,164,90,0.3);
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .collection-counter .star { color: var(--gold); }

  /* ─── MAP HINT ─── */
  .map-hint {
    position: absolute;
    bottom: 40px; left: 50%;
    transform: translateX(-50%);
    background: rgba(251,248,243,0.92);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    z-index: 80;
    white-space: nowrap;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  /* ─── POI MARKERS ─── */
  .poi-marker {
    width: 46px;
    height: 46px;
    background: var(--white);
    border: 2.5px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    position: relative;
  }

  .poi-marker:hover { transform: scale(1.1); }

  .poi-marker.active {
    border-color: var(--gold-dark);
    box-shadow: 0 0 0 4px rgba(200,164,90,0.25), 0 4px 16px rgba(0,0,0,0.2);
    transform: scale(1.15);
  }

  .poi-marker.collected {
    background: linear-gradient(135deg, var(--gold-pale), var(--gold-light));
    border-color: var(--gold-dark);
  }

  .collected-badge {
    position: absolute;
    top: -4px; right: -4px;
    width: 18px; height: 18px;
    background: var(--gold);
    border-radius: 50%;
    border: 2px solid white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: white;
    font-weight: 700;
  }

  /* ─── BOTTOM SHEET ─── */
  .bottom-sheet {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-radius: 28px 28px 0 0;
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 78%;
    overflow-y: auto;
    padding-bottom: 40px;
  }

  .bottom-sheet.open {
    transform: translateY(0);
  }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 16px;
  }

  .sheet-scroll-inner { padding: 0 24px; }

  .poi-category-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .poi-category-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--amber);
    background: var(--gold-pale);
    border: 1px solid var(--gold-light);
    border-radius: 6px;
    padding: 3px 8px;
  }

  .poi-title {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .poi-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .poi-tag {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--cream-dark);
    border-radius: 20px;
    padding: 4px 10px;
    border: 1px solid var(--border);
  }

  .poi-body {
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }

  .poi-divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  .poi-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .poi-meta-icon { font-size: 15px; }

  .arrive-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--amber) 100%);
    color: var(--white);
    border: none;
    border-radius: 16px;
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .arrive-btn:hover { opacity: 0.9; transform: scale(0.99); }
  .arrive-btn:active { transform: scale(0.97); }

  .arrive-btn-sub {
    font-size: 11px;
    opacity: 0.8;
    font-weight: 400;
    display: block;
    margin-top: 2px;
  }

  .close-sheet {
    position: absolute;
    top: 16px; right: 20px;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: var(--cream-dark);
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─── COLLECTION OVERLAY ─── */
  .collection-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 300;
    transform: translateY(100%);
    transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
  }

  .collection-overlay.open { transform: translateY(0); }

  .collection-card {
    background: var(--white);
    border-radius: 28px 28px 0 0;
    padding: 28px 28px 50px;
    text-align: center;
  }

  .collection-icon-wrap {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--gold-pale), var(--gold-light));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    border: 2px solid var(--gold);
    font-size: 32px;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
    position: relative;
    z-index: 1;
  }

  .collection-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .collection-poi-name {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .collection-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .photo-unlock-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px;
    background: var(--text-primary);
    color: var(--gold-light);
    border: none;
    border-radius: 16px;
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 12px;
  }

  .photo-unlock-btn:hover { opacity: 0.88; }
  .photo-unlock-btn:active { transform: scale(0.98); }

  .skip-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    padding: 8px;
  }

  /* sparkles */
  .sparkle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkleFly 0.8s ease-out forwards;
  }

  @keyframes sparkleFly {
    0%   { transform: translate(0,0) scale(0); opacity: 1; }
    60%  { opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.3); opacity: 0; }
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* ─── PHOTO SCREEN ─── */
  .photo-screen {
    position: absolute;
    inset: 0;
    background: #0D0C0A;
    z-index: 400;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .photo-screen.active { opacity: 1; pointer-events: all; }

  .photo-back-btn {
    position: absolute;
    top: 60px; left: 24px;
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    backdrop-filter: blur(8px);
  }

  .photo-viewfinder {
    position: absolute;
    top: 100px; left: 24px; right: 24px;
    height: 380px;
    border: 2px solid rgba(200,164,90,0.5);
    border-radius: 4px;
    overflow: hidden;
  }

  /* simulated camera view - warm gradient */
  .photo-viewfinder-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #3A2E20 0%, #2A1E10 40%, #1E1608 100%);
  }

  /* film grain overlay */
  .photo-viewfinder-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E");
    opacity: 0.3;
  }

  /* corner brackets */
  .bracket {
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--gold);
    border-style: solid;
  }

  .bracket.tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
  .bracket.tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
  .bracket.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
  .bracket.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  /* film strip sides */
  .film-strip-side {
    position: absolute;
    top: 0; bottom: 0;
    width: 24px;
    background: rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    align-items: center;
    gap: 0;
    padding: 8px 0;
  }

  .film-strip-side.left { left: 0; }
  .film-strip-side.right { right: 0; }

  .film-hole {
    width: 10px; height: 8px;
    border-radius: 2px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .photo-poi-label {
    position: absolute;
    bottom: 16px; left: 32px; right: 32px;
    text-align: center;
    font-family: var(--font-serif);
    font-size: 15px;
    font-style: italic;
    color: rgba(200,164,90,0.9);
    letter-spacing: 0.05em;
    text-shadow: 0 1px 8px rgba(0,0,0,0.8);
  }

  .photo-location-line {
    font-size: 11px;
    font-family: var(--font-sans);
    font-style: normal;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: block;
    margin-top: 4px;
  }

  .photo-shutter-area {
    position: absolute;
    bottom: 48px;
    left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
  }

  .shutter-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--white);
    border: 3px solid rgba(255,255,255,0.4);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    transition: transform 0.15s;
    box-shadow: 0 0 0 6px rgba(255,255,255,0.1);
  }

  .shutter-btn:active { transform: scale(0.92); }

  .photo-label {
    position: absolute;
    top: 88px; left: 0; right: 0;
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.08em;
  }

  /* ─── TICKET SCREEN ─── */
  .ticket-screen {
    position: absolute;
    inset: 0;
    background: var(--cream);
    z-index: 400;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    padding-bottom: 40px;
  }

  .ticket-screen.active { opacity: 1; pointer-events: all; }

  .ticket-top-bar {
    padding: 60px 24px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ticket-top-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .ticket-back-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }

  .ticket-wrap {
    margin: 0 20px;
    animation: ticketReveal 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) 0.1s both;
  }

  @keyframes ticketReveal {
    from { transform: scale(0.9) translateY(20px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* Ticket card */
  .ticket-card {
    background: var(--white);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.05);
    position: relative;
  }

  /* Photo zone */
  .ticket-photo {
    height: 180px;
    background: linear-gradient(160deg, #4A3828 0%, #2E2010 60%, #1A1008 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ticket-photo-emoji {
    font-size: 56px;
    opacity: 0.6;
    filter: drop-shadow(0 2px 16px rgba(0,0,0,0.5));
  }

  .ticket-photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.4) 100%);
  }

  .ticket-photo-label {
    position: absolute;
    bottom: 12px; left: 16px;
    font-family: var(--font-serif);
    font-size: 13px;
    font-style: italic;
    color: rgba(200,164,90,0.9);
    letter-spacing: 0.03em;
  }

  /* Ticket body */
  .ticket-body { padding: 20px 20px 0; }

  .ticket-poi-name {
    font-family: var(--font-serif);
    font-size: 24px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.25;
    margin-bottom: 6px;
  }

  .ticket-category-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  .ticket-cat-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--amber);
    background: var(--gold-pale);
    border: 1px solid var(--gold-light);
    border-radius: 6px;
    padding: 3px 8px;
  }

  /* Dotted perforation */
  .ticket-perf {
    height: 1px;
    margin: 16px 0;
    background: repeating-linear-gradient(
      to right,
      var(--border) 0px, var(--border) 6px,
      transparent 6px, transparent 12px
    );
    position: relative;
  }

  .ticket-perf::before,
  .ticket-perf::after {
    content: '';
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--cream);
    border: 1px solid var(--border);
  }

  .ticket-perf::before { left: -32px; }
  .ticket-perf::after  { right: -32px; }

  .ticket-meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 0 20px;
  }

  .ticket-meta-item {}
  .ticket-meta-key {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 3px;
  }
  .ticket-meta-val {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    font-family: var(--font-serif);
  }

  /* VISITED stamp */
  .ticket-stamp {
    position: absolute;
    top: 160px; right: 24px;
    width: 80px; height: 80px;
    border: 3px solid var(--red-stamp);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transform: rotate(-12deg);
    opacity: 0.85;
    z-index: 5;
  }

  .ticket-stamp-text {
    font-family: var(--font-serif);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--red-stamp);
    line-height: 1.2;
    text-align: center;
  }

  .ticket-stamp-star {
    color: var(--red-stamp);
    font-size: 16px;
    margin-bottom: 2px;
  }

  /* Ticket actions */
  .ticket-actions {
    display: flex;
    gap: 10px;
    padding: 16px 20px 20px;
  }

  .ticket-action-primary {
    flex: 1;
    padding: 13px;
    background: var(--text-primary);

let appState     = 'map'; // map | detail | arrived | photo | ticket

// ─── MAP INIT ───────────────────────────────────────────────────────────────

const map = L.map('map', {
  center: [31.2448, 121.4890],
  zoom: 14.5,
  zoomControl: false,
  attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Build markers
POIS.forEach(poi => {
  const mkEl = document.createElement('div');
  mkEl.className = 'poi-marker';
  mkEl.innerHTML = poi.emoji;
  mkEl.title = poi.name;

  const icon = L.divIcon({
    html: mkEl.outerHTML,
    iconSize: [46, 46],
    iconAnchor: [23, 23],
    className: ''
  });

  const marker = L.marker([poi.lat, poi.lng], { icon })
    .addTo(map)
    .on('click', () => openDetail(poi));

  markers[poi.id] = marker;
});

// ─── DETAIL SHEET ───────────────────────────────────────────────────────────

function openDetail(poi) {
  currentPoi = poi;
  document.getElementById('mapHint').style.opacity = '0';

  // Build content
  const isCollected = collectedIds.has(poi.id);
  const filmRow = poi.films.length
    ? `<div class="poi-meta-row"><span class="poi-meta-icon">🎬</span><span>影视出镜：${poi.films.join('、')}</span></div>`
    : '';

  document.getElementById('sheetContent').innerHTML = `
    <div class="poi-category-row">
      <div class="poi-category-badge">${poi.category}</div>
      <span style="font-size:11px;color:var(--text-muted);">上海</span>
    </div>
    <div class="poi-title">${poi.title}</div>
    <div class="poi-tags">
      ${poi.tags.map(t => `<div class="poi-tag">${t}</div>`).join('')}
    </div>
    <div class="poi-body">${poi.body}</div>
    <div style="font-size:13px;color:var(--text-muted);font-style:italic;background:var(--cream-dark);padding:12px 14px;border-radius:10px;border-left:3px solid var(--gold);line-height:1.6;margin-bottom:16px;">
      ${poi.full_body}
    </div>
    <div class="poi-divider"></div>
    <div class="poi-meta-row"><span class="poi-meta-icon">📍</span><span>${poi.address}</span></div>
    ${Object.entries(poi.meta).map(([k,v]) => `
      <div class="poi-meta-row"><span class="poi-meta-icon">·</span><span>${k}：${v}</span></div>
    `).join('')}
    ${filmRow}
    <button class="arrive-btn" id="arriveBtn" ${isCollected ? 'disabled style="opacity:0.5;cursor:default;"' : ''}>
      ${isCollected
        ? '<span>✦</span><div>已收藏此地点<span class="arrive-btn-sub">再次探索</span></div>'
        : '<span style="font-size:18px;">📍</span><div>模拟到达此地点<span class="arrive-btn-sub">地理位置校验成功后解锁</span></div>'
      }
    </button>
  `;

  if (!isCollected) {
    document.getElementById('arriveBtn').addEventListener('click', () => triggerArrival(poi));
  }

  setActiveMarker(poi.id);
  document.getElementById('bottomSheet').classList.add('open');
  document.getElementById('backdrop').classList.add('dim');
  appState = 'detail';
}

function closeDetail() {
  document.getElementById('bottomSheet').classList.remove('open');
  document.getElementById('backdrop').classList.remove('dim');
  clearActiveMarker();
  appState = 'map';
  setTimeout(() => {
    document.getElementById('mapHint').style.opacity = collectedIds.size > 0 ? '0' : '1';
  }, 300);
}

document.getElementById('closeSheet').addEventListener('click', closeDetail);
document.getElementById('backdrop').addEventListener('click', closeDetail);

// ─── ARRIVAL ────────────────────────────────────────────────────────────────

function triggerArrival(poi) {
  // Close sheet
  document.getElementById('bottomSheet').classList.remove('open');
  document.getElementById('backdrop').classList.remove('dim');

  collectedIds.add(poi.id);
  updateCounter();
  updateMarker(poi.id);

  // Fill collection card
  document.getElementById('collectionIcon').textContent = poi.emoji;
  document.getElementById('collectionPoiName').textContent = poi.name;
  document.getElementById('collectionPoiSub').textContent = `${poi.category} · 上海`;

  // Sparkles
  spawnSparkles();

  document.getElementById('collectionOverlay').classList.add('open');
  appState = 'arrived';
}

function spawnSparkles() {
  const host = document.getElementById('sparkleHost');
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const angle = (i / 12) * 360;
    const dist  = 50 + Math.random() * 40;
    const dx = Math.cos(angle * Math.PI/180) * dist;
    const dy = Math.sin(angle * Math.PI/180) * dist;
    const colors = ['#C8A45A','#E8D5A3','#A07228','#F5EDD8','#8B6A20'];
    const size = 6 + Math.random() * 8;
    s.style.cssText = `
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      top:50%;left:50%;
      margin-top:-${size/2}px;margin-left:-${size/2}px;
      --dx:${dx}px;--dy:${dy}px;
      animation-delay:${Math.random()*0.3}s;
    `;
    host.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}

document.getElementById('goPhotoBtn').addEventListener('click', () => {
  document.getElementById('collectionOverlay').classList.remove('open');
  openPhotoScreen(currentPoi);
});

document.getElementById('skipPhotoBtn').addEventListener('click', () => {
  document.getElementById('collectionOverlay').classList.remove('open');
  appState = 'map';
  showToast(`✦ ${currentPoi.name} 已收藏`);
});

// ─── PHOTO SCREEN ───────────────────────────────────────────────────────────

function openPhotoScreen(poi) {
  // Generate film holes
  ['filmLeft','filmRight'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    for (let i = 0; i < 10; i++) {
      const h = document.createElement('div');
      h.className = 'film-hole';
      el.appendChild(h);
    }
  });

  const vLabel = document.getElementById('viewfinderLabel');
  vLabel.querySelector('span:first-child').textContent = poi.name;
  document.getElementById('viewfinderSub').textContent = poi.address;
  document.getElementById('photoLabel').textContent = poi.category.toUpperCase();

  document.getElementById('photoScreen').classList.add('active');
  appState = 'photo';
}

document.getElementById('photoBack').addEventListener('click', () => {
  document.getElementById('photoScreen').classList.remove('active');
  appState = 'map';
  showToast(`✦ ${currentPoi.name} 已收藏`);
});

document.getElementById('shutterBtn').addEventListener('click', () => {
  // Flash effect
  const flash = document.createElement('div');
  flash.style.cssText = `position:absolute;inset:0;background:white;z-index:9999;animation:none;pointer-events:none;`;
  document.getElementById('photoScreen').appendChild(flash);
  flash.animate([{opacity:0.9},{opacity:0}], {duration:300,fill:'forwards'})
    .finished.then(() => {
      flash.remove();
      document.getElementById('photoScreen').classList.remove('active');
      openTicketScreen(currentPoi);
    });
});

// ─── TICKET SCREEN ──────────────────────────────────────────────────────────

function openTicketScreen(poi) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });

  document.getElementById('ticketEmoji').textContent = poi.emoji;
  document.getElementById('ticketPhotoLabel').textContent = poi.name;
  document.getElementById('ticketName').textContent = poi.name;
  document.getElementById('ticketCat').textContent = poi.category;

  document.getElementById('ticketMeta').innerHTML = `
    <div class="ticket-meta-item">
      <div class="ticket-meta-key">到访日期</div>
      <div class="ticket-meta-val">${dateStr}</div>
    </div>
    <div class="ticket-meta-item">
      <div class="ticket-meta-key">地点坐标</div>
      <div class="ticket-meta-val">${poi.lat.toFixed(4)}°N</div>
    </div>
    <div class="ticket-meta-item">
      <div class="ticket-meta-key">地址</div>
      <div class="ticket-meta-val">${poi.address.split('·')[0].trim()}</div>
    </div>
    <div class="ticket-meta-item">
      <div class="ticket-meta-key">收藏进度</div>
      <div class="ticket-meta-val">${collectedIds.size} / ${POIS.length} ✦</div>
    </div>
  `;

  // Nearby (uncollected POIs)
  const nearby = POIS.filter(p => p.id !== poi.id && !collectedIds.has(p.id)).slice(0, 3);
  document.getElementById('nearbyList').innerHTML = nearby.map(p => `
    <div class="ticket-nearby-item">
      <div class="ticket-nearby-dot"></div>
      <span>${p.emoji} ${p.name} · ${p.category}</span>
    </div>
  `).join('');

  if (nearby.length === 0) {
    document.getElementById('ticketNearby').style.display = 'none';
  } else {
    document.getElementById('ticketNearby').style.display = 'block';
    document.getElementById('ticketNearby').querySelector('.ticket-nearby-label').textContent =
      `附近还有 ${nearby.length} 处未探索`;
  }

  document.getElementById('ticketScreen').classList.add('active');
  appState = 'ticket';
}

document.getElementById('ticketBack').addEventListener('click', () => {
  document.getElementById('ticketScreen').classList.remove('active');
  appState = 'map';
  showToast(`收藏进度 ${collectedIds.size}/${POIS.length} ✦`);
});

document.getElementById('shareBtn').addEventListener('click', () => {
  showToast('分享图已生成，可发送给好友 ↑');
});

document.getElementById('saveBtn').addEventListener('click', () => {
  document.getElementById('saveBtn').textContent = '♥ 已收藏';
});

// ─── HELPERS ────────────────────────────────────────────────────────────────

function updateCounter() {
  document.getElementById('counter-text').textContent = `${collectedIds.size} / ${POIS.length} 已收集`;
}

function updateMarker(poiId) {
  const poi = POIS.find(p => p.id === poiId);
  if (!poi) return;

  const mkEl = document.createElement('div');
  mkEl.className = 'poi-marker collected';
  mkEl.innerHTML = `${poi.emoji}<div class="collected-badge">✦</div>`;

  const icon = L.divIcon({
    html: mkEl.outerHTML,
    iconSize: [46, 46],
    iconAnchor: [23, 23],
    className: ''
  });

  markers[poiId].setIcon(icon);
}

function setActiveMarker(poiId) {
  // Reset all, set active
  POIS.forEach(poi => {
    const isCollected = collectedIds.has(poi.id);
    const isActive    = poi.id === poiId;

    const mkEl = document.createElement('div');
    mkEl.className = `poi-marker${isCollected ? ' collected' : ''}${isActive ? ' active' : ''}`;
    mkEl.innerHTML = `${poi.emoji}${isCollected ? '<div class="collected-badge">✦</div>' : ''}`;

    markers[poi.id].setIcon(L.divIcon({
      html: mkEl.outerHTML,
      iconSize: [46, 46],
      iconAnchor: [23, 23],
      className: ''
    }));
  });
}

function clearActiveMarker() {
  POIS.forEach(poi => {
    const isCollected = collectedIds.has(poi.id);
    const mkEl = document.createElement('div');
    mkEl.className = `poi-marker${isCollected ? ' collected' : ''}`;
    mkEl.innerHTML = `${poi.emoji}${isCollected ? '<div class="collected-badge">✦</div>' : ''}`;

    markers[poi.id].setIcon(L.divIcon({
      html: mkEl.outerHTML,
      iconSize: [46, 46],
      iconAnchor: [23, 23],
      className: ''
    }));
  });
}

let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// Initial map invalidation
setTimeout(() => map.invalidateSize(), 100);
</script>
